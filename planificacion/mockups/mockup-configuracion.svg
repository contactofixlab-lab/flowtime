  <text x="110" y="120" fill="#E2E8F0" font-size="15" font-weight="700">Vicente Rabanales</text>
  <text x="110" y="138" fill="#64748B" font-size="11">vrabanales@rcapcorp.cl</text>
  <text x="110" y="156" fill="#475569" font-size="10">🌎 America/Santiago</text>
  <rect x="310" y="120" width="62" height="26" rx="13" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.35)" stroke-width="1"/>
