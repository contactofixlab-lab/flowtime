  <rect x="208" y="566" width="52" height="22" rx="11" fill="rgba(244,63,94,0.18)" stroke="rgba(244,63,94,0.35)" stroke-width="1"/>
  <text x="234" y="581" text-anchor="middle" fill="#FB7185" font-size="10">urgente</text>
  <rect x="32" y="598" width="72" height="20" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="68" y="612" text-anchor="middle" fill="#64748B" font-size="10">+ Nueva</text>

