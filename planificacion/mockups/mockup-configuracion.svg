  <!-- Tags -->
  <rect x="32" y="566" width="58" height="22" rx="11" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="61" y="581" text-anchor="middle" fill="#FBBF24" font-size="10">finanzas</text>
  <rect x="98" y="566" width="54" height="22" rx="11" fill="rgba(79,70,229,0.18)" stroke="rgba(79,70,229,0.35)" stroke-width="1"/>
  <text x="125" y="581" text-anchor="middle" fill="#818CF8" font-size="10">reportes</text>
  <rect x="160" y="566" width="40" height="22" rx="11" fill="rgba(16,185,129,0.18)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
