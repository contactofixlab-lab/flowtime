  <!-- Header -->
  <text x="200" y="64" text-anchor="middle" fill="#E2E8F0" font-size="20" font-weight="800">Configuración</text>

  <!-- ── PROFILE SECTION ── -->
  <rect x="16" y="80" width="368" height="110" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="64" cy="135" r="30" fill="url(#indigo)" stroke="#4F46E5" stroke-width="2"/>
