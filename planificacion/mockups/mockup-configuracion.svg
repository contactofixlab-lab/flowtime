<svg viewBox="0 0 400 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A"/>
      <stop offset="50%" style="stop-color:#0D0D28"/>
      <stop offset="100%" style="stop-color:#120A2E"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(15,15,40,0.95)"/>
      <stop offset="100%" style="stop-color:rgba(10,10,30,0.98)"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>

  <rect width="400" height="900" fill="url(#bg)" rx="40"/>
  <circle cx="320" cy="150" r="100" fill="rgba(79,70,229,0.09)" filter="url(#blur1)"/>

  <!-- Status bar -->
  <text x="24" y="26" fill="#94A3B8" font-size="11" font-weight="600">9:41</text>
