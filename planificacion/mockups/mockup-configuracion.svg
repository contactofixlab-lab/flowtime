  <rect x="20" y="660" width="110" height="46" rx="14" fill="rgba(79,70,229,0.22)" stroke="rgba(79,70,229,0.4)" stroke-width="1"/>
  <text x="75" y="685" text-anchor="middle" fill="#818CF8" font-size="11" font-weight="700">🌑 Dark</text>
  <text x="210" y="685" text-anchor="middle" fill="#475569" font-size="11">☀ Light</text>
  <text x="340" y="685" text-anchor="middle" fill="#475569" font-size="11">Auto</text>

  <!-- ── CUENTA ── -->
  <text x="24" y="736" fill="#64748B" font-size="11" font-weight="700" letter-spacing="1">CUENTA</text>
  <rect x="16" y="744" width="368" height="42" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
