  <text x="368" y="769" text-anchor="end" fill="#475569" font-size="14">›</text>

  <!-- Bottom Nav -->
  <rect x="0" y="802" width="400" height="98" fill="url(#navGrad)"/>
  <rect x="0" y="802" width="400" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="53"  y="836" text-anchor="middle" font-size="18">📊</text>
  <text x="53"  y="854" text-anchor="middle" fill="#475569" font-size="9">Inicio</text>
  <text x="126" y="836" text-anchor="middle" font-size="18">✅</text>
  <text x="126" y="854" text-anchor="middle" fill="#475569" font-size="9">Tareas</text>
  <circle cx="200" cy="826" r="26" fill="url(#indigo)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <text x="200" y="833" text-anchor="middle" fill="#fff" font-size="22" font-weight="300">+</text>
  <text x="274" y="836" text-anchor="middle" font-size="18">📅</text>
  <text x="274" y="854" text-anchor="middle" fill="#475569" font-size="9">Calendario</text>
  <rect x="318" y="812" width="64" height="52" rx="14" fill="rgba(79,70,229,0.25)" stroke="rgba(79,70,229,0.4)" stroke-width="1"/>
  <text x="350" y="836" text-anchor="middle" font-size="18">⚙️</text>
  <text x="350" y="854" text-anchor="middle" fill="#818CF8" font-size="9" font-weight="700">Config</text>

  <rect x="140" y="4" width="120" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="200" y="880" text-anchor="middle" fill="#1E293B" font-size="11">FlowTime — Configuración</text>
</svg>
