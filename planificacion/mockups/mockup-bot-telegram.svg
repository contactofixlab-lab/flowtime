<svg viewBox="0 0 400 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17212B"/><stop offset="100%" style="stop-color:#0E1621"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2B5278"/><stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="inputBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2733"/><stop offset="100%" style="stop-color:#17212B"/>
    </linearGradient>
    <linearGradient id="sendBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/><stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Phone bg (Telegram dark theme) -->
  <rect width="400" height="780" fill="url(#bg)" rx="40"/>

  <!-- Chat background pattern -->
  <rect width="400" height="780" fill="url(#bg)" rx="40"/>

  <!-- Status bar -->
  <text x="24" y="26" fill="#aaa" font-size="11" font-weight="600">9:41</text>
  <text x="376" y="26" text-anchor="end" fill="#aaa" font-size="11">●●●</text>

  <!-- Telegram Header -->
  <rect x="0" y="36" width="400" height="58" fill="url(#headerGrad)"/>
  <text x="24" y="58" fill="#aaa" font-size="18">←</text>
  <!-- Bot avatar -->
  <circle cx="66" cy="65" r="20" fill="#4F46E5"/>
  <text x="66" y="71" text-anchor="middle" fill="#fff" font-size="16">⚡</text>
  <!-- Bot info -->
  <text x="96" y="58" fill="#fff" font-size="14" font-weight="700">FlowTime Bot</text>
  <text x="96" y="74" fill="#4CC9F0" font-size="11">en línea</text>
  <!-- Menu -->
  <text x="376" y="68" text-anchor="end" fill="#aaa" font-size="18">⋮</text>

  <!-- ===== CHAT MESSAGES ===== -->

  <!-- Date separator -->
  <rect x="140" y="106" width="120" height="22" rx="11" fill="rgba(0,0,0,0.3)"/>
  <text x="200" y="121" text-anchor="middle" fill="#aaa" font-size="10">Hoy</text>

  <!-- BOT message: bienvenida -->
  <rect x="16" y="136" width="260" height="68" rx="14" rx2="4" fill="#182533"/>
  <text x="32" y="158" fill="#fff" font-size="12" font-weight="600">¡Hola Vicente! 👋</text>
  <text x="32" y="175" fill="#aaa" font-size="11">Soy FlowTime Bot. Puedo</text>
  <text x="32" y="190" fill="#aaa" font-size="11">ayudarte a gestionar tus tareas.</text>
  <text x="266" y="198" text-anchor="end" fill="#607080" font-size="9">9:30 ✓✓</text>

  <!-- USER message -->
  <rect x="124" y="214" width="260" height="40" rx="14" rx2="4" fill="#2B5278"/>
  <text x="140" y="232" fill="#fff" font-size="12">Crea una tarea urgente:</text>
  <text x="140" y="248" fill="#fff" font-size="12">llamar al banco mañana a las 10</text>
  <text x="374" y="248" text-anchor="end" fill="#607080" font-size="9">9:31 ✓✓</text>

  <!-- BOT response: task created -->
  <rect x="16" y="264" width="280" height="110" rx="14" fill="#182533"/>
  <rect x="16" y="264" width="4" height="110" rx="2" fill="#4F46E5"/>
  <text x="32" y="286" fill="#34D399" font-size="12" font-weight="700">✅ Tarea creada exitosamente</text>
  <text x="32" y="304" fill="#fff" font-size="11" font-weight="600">📋 Llamar al banco</text>
  <text x="32" y="320" fill="#FB7185" font-size="11">🔴 Prioridad: Urgente</text>
  <text x="32" y="336" fill="#aaa" font-size="11">📅 Mañana a las 10:00</text>
  <text x="32" y="352" fill="#4CC9F0" font-size="11">⏰ Recordatorio: 9:45</text>
  <text x="286" y="368" text-anchor="end" fill="#607080" font-size="9">9:31 ✓✓</text>

  <!-- USER voice message -->
  <rect x="116" y="384" width="268" height="48" rx="24" fill="#2B5278"/>
  <!-- Voice waveform -->
  <circle cx="140" cy="408" r="16" fill="rgba(79,70,229,0.3)" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="140" y="413" text-anchor="middle" fill="#818CF8" font-size="14">🎙</text>
  <!-- Waveform bars -->
  <rect x="166" y="402" width="3" height="12" rx="1" fill="#4CC9F0" opacity="0.6"/>
  <rect x="173" y="398" width="3" height="20" rx="1" fill="#4CC9F0" opacity="0.8"/>
  <rect x="180" y="394" width="3" height="28" rx="1" fill="#4CC9F0"/>
  <rect x="187" y="400" width="3" height="16" rx="1" fill="#4CC9F0" opacity="0.8"/>
  <rect x="194" y="396" width="3" height="24" rx="1" fill="#4CC9F0" opacity="0.9"/>
  <rect x="201" y="403" width="3" height="10" rx="1" fill="#4CC9F0" opacity="0.6"/>
  <rect x="208" y="399" width="3" height="18" rx="1" fill="#4CC9F0" opacity="0.7"/>
  <rect x="215" y="395" width="3" height="26" rx="1" fill="#4CC9F0" opacity="0.9"/>
  <rect x="222" y="401" width="3" height="14" rx="1" fill="#4CC9F0" opacity="0.6"/>
  <rect x="229" y="397" width="3" height="22" rx="1" fill="#4CC9F0" opacity="0.8"/>
  <rect x="236" y="403" width="3" height="10" rx="1" fill="#4CC9F0" opacity="0.5"/>
  <rect x="243" y="399" width="3" height="18" rx="1" fill="#4CC9F0" opacity="0.7"/>
  <text x="256" y="405" fill="#aaa" font-size="9">0:08</text>
  <text x="374" y="426" text-anchor="end" fill="#607080" font-size="9">9:33 ✓✓</text>

  <!-- Transcription bubble (bot shows what it understood) -->
  <rect x="16" y="442" width="280" height="56" rx="14" fill="#182533"/>
  <text x="32" y="462" fill="#607080" font-size="10" font-style="italic">🎙 Transcripción: "Recuérdame revisar</text>
  <text x="32" y="476" fill="#607080" font-size="10" font-style="italic">el contrato el viernes a las 3"</text>
  <text x="32" y="490" fill="#34D399" font-size="11" font-weight="600">✅ Recordatorio creado para viernes 15:00</text>
  <text x="286" y="492" text-anchor="end" fill="#607080" font-size="9">9:33 ✓✓</text>

  <!-- USER: /list -->
  <rect x="270" y="508" width="114" height="32" rx="16" fill="#2B5278"/>
  <text x="327" y="528" text-anchor="middle" fill="#4CC9F0" font-size="12" font-weight="600">/list</text>
  <text x="374" y="534" text-anchor="end" fill="#607080" font-size="9">9:34 ✓✓</text>

  <!-- BOT list response -->
  <rect x="16" y="550" width="280" height="112" rx="14" fill="#182533"/>
  <text x="32" y="570" fill="#fff" font-size="11" font-weight="700">📋 Pendientes (4)</text>
  <text x="32" y="588" fill="#FB7185" font-size="11">🔴 Llamar al banco — mañana 10:00</text>
  <text x="32" y="604" fill="#FBBF24" font-size="11">🟠 Contrato Empresa X — lunes</text>
  <text x="32" y="620" fill="#818CF8" font-size="11">🔵 Presentación Q3 — viernes</text>
  <text x="32" y="636" fill="#64748B" font-size="11">⚪ Ordenar escritorio — sin fecha</text>
  <text x="32" y="652" fill="#4CC9F0" font-size="10">Para completar: /done [id]</text>
  <text x="286" y="656" text-anchor="end" fill="#607080" font-size="9">9:34 ✓✓</text>

  <!-- ===== INPUT BAR ===== -->
  <rect x="0" y="682" width="400" height="98" fill="url(#inputBar)"/>
  <rect x="0" y="682" width="400" height="1" fill="rgba(255,255,255,0.05)"/>

  <!-- Input field -->
  <rect x="16" y="696" width="288" height="44" rx="22" fill="#242F3D"/>
  <text x="36" y="697" fill="#607080" font-size="18">😊</text>
  <text x="66" y="722" fill="#607080" font-size="12">Escribe un mensaje o 🎙...</text>
  <text x="290" y="718" fill="#607080" font-size="18">📎</text>

  <!-- Voice btn -->
  <circle cx="352" cy="718" r="22" fill="url(#sendBtn)"/>
  <text x="352" y="724" text-anchor="middle" fill="#fff" font-size="18">🎙</text>

  <rect x="140" y="4" width="120" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="200" y="760" text-anchor="middle" fill="#1E293B" font-size="11">FlowTime — Bot Telegram</text>
</svg>
