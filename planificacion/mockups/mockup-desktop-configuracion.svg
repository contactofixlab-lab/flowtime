      <stop offset="100%" style="stop-color:rgba(10,10,28,0.96)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="45"/></filter>
    <filter id="pillGlow"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="softShadow"><feGaussianBlur stdDeviation="8"/></filter>
