<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A"/>
      <stop offset="100%" style="stop-color:#0F0F2E"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700" letter-spacing="2">ARQUITECTURA DEL SISTEMA</text>
  <text x="450" y="60" text-anchor="middle" fill="#E2E8F0" font-size="20" font-weight="800">FlowTime — Vista General</text>

  <!-- ===== LAYER 1: CLIENTES ===== -->
  <text x="450" y="95" text-anchor="middle" fill="#64748B" font-size="10" letter-spacing="1.5">CAPA DE CLIENTES</text>

  <!-- Browser Card -->
  <rect x="80" y="108" width="200" height="80" rx="14" fill="rgba(79,70,229,0.12)" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="180" y="138" text-anchor="middle" fill="#818CF8" font-size="22">🖥️</text>
  <text x="180" y="158" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">Navegador Web</text>
  <text x="180" y="175" text-anchor="middle" fill="#94A3B8" font-size="10">Dashboard · Tareas · Calendario</text>

  <!-- Telegram Card -->
  <rect x="350" y="108" width="200" height="80" rx="14" fill="rgba(14,165,233,0.12)" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="450" y="138" text-anchor="middle" fill="#38BDF8" font-size="22">📱</text>
  <text x="450" y="158" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">Bot Telegram</text>
  <text x="450" y="175" text-anchor="middle" fill="#94A3B8" font-size="10">Texto · Voz · Comandos</text>

  <!-- PWA Card -->
  <rect x="620" y="108" width="200" height="80" rx="14" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5"/>
  <text x="720" y="138" text-anchor="middle" fill="#34D399" font-size="22">📲</text>
  <text x="720" y="158" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">PWA Móvil</text>
  <text x="720" y="175" text-anchor="middle" fill="#94A3B8" font-size="10">Instalable · Offline ready</text>

  <!-- Arrows down to Vercel -->
  <line x1="180" y1="188" x2="180" y2="235" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="175,233 185,233 180,241" fill="#4F46E5"/>
  <line x1="450" y1="188" x2="450" y2="235" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,233 455,233 450,241" fill="#0EA5E9"/>
  <line x1="720" y1="188" x2="720" y2="235" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="715,233 725,233 720,241" fill="#10B981"/>

  <!-- ===== LAYER 2: VERCEL / NEXT.JS ===== -->
  <text x="450" y="250" text-anchor="middle" fill="#64748B" font-size="10" letter-spacing="1.5">CAPA DE APLICACIÓN — VERCEL / NEXT.JS 15</text>

  <rect x="60" y="262" width="780" height="160" rx="16" fill="rgba(79,70,229,0.06)" stroke="rgba(79,70,229,0.3)" stroke-width="1.5"/>

  <!-- App Router -->
  <rect x="84" y="282" width="170" height="120" rx="10" fill="rgba(79,70,229,0.15)" stroke="#4F46E5" stroke-width="1"/>
  <text x="169" y="306" text-anchor="middle" fill="#818CF8" font-size="11" font-weight="700">APP ROUTER</text>
  <text x="169" y="323" text-anchor="middle" fill="#94A3B8" font-size="9">/dashboard</text>
  <text x="169" y="338" text-anchor="middle" fill="#94A3B8" font-size="9">/tasks</text>
  <text x="169" y="353" text-anchor="middle" fill="#94A3B8" font-size="9">/calendar</text>
  <text x="169" y="368" text-anchor="middle" fill="#94A3B8" font-size="9">/history</text>
  <text x="169" y="383" text-anchor="middle" fill="#94A3B8" font-size="9">/settings</text>

  <!-- API Routes -->
  <rect x="274" y="282" width="180" height="120" rx="10" fill="rgba(14,165,233,0.15)" stroke="#0EA5E9" stroke-width="1"/>
  <text x="364" y="306" text-anchor="middle" fill="#38BDF8" font-size="11" font-weight="700">API ROUTES</text>
  <text x="364" y="323" text-anchor="middle" fill="#94A3B8" font-size="9">/api/tasks</text>
  <text x="364" y="338" text-anchor="middle" fill="#94A3B8" font-size="9">/api/events</text>
  <text x="364" y="353" text-anchor="middle" fill="#94A3B8" font-size="9">/api/reminders</text>
  <text x="364" y="368" text-anchor="middle" fill="#94A3B8" font-size="9">/api/auth</text>
  <text x="364" y="383" text-anchor="middle" fill="#94A3B8" font-size="9">/api/telegram/webhook</text>

  <!-- Grammy Bot -->
  <rect x="474" y="282" width="160" height="120" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1"/>
  <text x="554" y="306" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">GRAMMY BOT</text>
  <text x="554" y="326" text-anchor="middle" fill="#94A3B8" font-size="9">Comandos</text>
  <text x="554" y="341" text-anchor="middle" fill="#94A3B8" font-size="9">Mensajes de voz</text>
  <text x="554" y="356" text-anchor="middle" fill="#94A3B8" font-size="9">Transcripción</text>
  <text x="554" y="371" text-anchor="middle" fill="#94A3B8" font-size="9">Recordatorios</text>

  <!-- Vercel Cron -->
  <rect x="654" y="282" width="166" height="120" rx="10" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1"/>
  <text x="737" y="306" text-anchor="middle" fill="#FBBF24" font-size="11" font-weight="700">VERCEL CRON</text>
  <text x="737" y="326" text-anchor="middle" fill="#94A3B8" font-size="9">Cada minuto</text>
  <text x="737" y="341" text-anchor="middle" fill="#94A3B8" font-size="9">Verifica recordatorios</text>
  <text x="737" y="356" text-anchor="middle" fill="#94A3B8" font-size="9">Dispara bot</text>
  <text x="737" y="371" text-anchor="middle" fill="#94A3B8" font-size="9">/api/cron/reminders</text>

  <!-- Auth label -->
  <text x="450" y="415" text-anchor="middle" fill="#A78BFA" font-size="9">NextAuth v5 · Prisma ORM · Framer Motion · Recharts · react-big-calendar</text>

  <!-- Arrows to DB layer -->
  <line x1="290" y1="422" x2="290" y2="468" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="285,466 295,466 290,474" fill="#4F46E5"/>
  <line x1="450" y1="422" x2="450" y2="468" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,466 455,466 450,474" fill="#0EA5E9"/>
  <line x1="610" y1="422" x2="610" y2="468" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="605,466 615,466 610,474" fill="#10B981"/>

  <!-- ===== LAYER 3: EXTERNAL SERVICES ===== -->
  <text x="450" y="486" text-anchor="middle" fill="#64748B" font-size="10" letter-spacing="1.5">SERVICIOS EXTERNOS</text>

  <!-- Neon -->
  <rect x="80" y="498" width="200" height="80" rx="14" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5"/>
  <text x="180" y="528" text-anchor="middle" fill="#34D399" font-size="20">🐘</text>
  <text x="180" y="548" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">Neon Postgres</text>
  <text x="180" y="565" text-anchor="middle" fill="#94A3B8" font-size="10">Base de datos principal</text>

  <!-- Telegram API -->
  <rect x="350" y="498" width="200" height="80" rx="14" fill="rgba(14,165,233,0.12)" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="450" y="528" text-anchor="middle" fill="#38BDF8" font-size="20">✈️</text>
  <text x="450" y="548" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">Telegram API</text>
  <text x="450" y="565" text-anchor="middle" fill="#94A3B8" font-size="10">Mensajes · Webhooks</text>

  <!-- OpenAI -->
  <rect x="620" y="498" width="200" height="80" rx="14" fill="rgba(124,58,237,0.12)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="720" y="528" text-anchor="middle" fill="#A78BFA" font-size="20">🎙️</text>
  <text x="720" y="548" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">OpenAI Whisper</text>
  <text x="720" y="565" text-anchor="middle" fill="#94A3B8" font-size="10">Voz → Texto</text>

  <!-- Footer -->
  <text x="450" y="608" text-anchor="middle" fill="#334155" font-size="9">FlowTime — Arquitectura del Sistema v1.0 · 2026</text>
</svg>
