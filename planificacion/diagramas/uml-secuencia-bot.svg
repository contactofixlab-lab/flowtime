<svg viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A"/><stop offset="100%" style="stop-color:#0F0F2E"/>
    </linearGradient>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#818CF8"/></marker>
    <marker id="arrT" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#38BDF8"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#34D399"/></marker>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#A78BFA"/></marker>
    <marker id="arrD" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/></marker>
    <marker id="arrY" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#FBBF24"/></marker>
  </defs>
  <rect width="980" height="640" fill="url(#bg)" rx="16"/>

  <text x="490" y="34" text-anchor="middle" fill="#38BDF8" font-size="11" font-weight="700" letter-spacing="2">UML — DIAGRAMA DE SECUENCIA</text>
  <text x="490" y="56" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="800">Crear Tarea por Mensaje de Voz — Bot Telegram</text>

  <!-- ══ LIFELINE HEADERS ══ -->
  <rect x="20"  y="74" width="90"  height="38" rx="8" fill="rgba(14,165,233,0.2)"  stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="65"  y="98" text-anchor="middle" fill="#38BDF8" font-size="11" font-weight="700">Usuario</text>

  <rect x="140" y="74" width="100" height="38" rx="8" fill="rgba(14,165,233,0.15)" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="190" y="91" text-anchor="middle" fill="#38BDF8" font-size="11" font-weight="700">Telegram</text>
  <text x="190" y="105" text-anchor="middle" fill="#38BDF8" font-size="10">API</text>

  <rect x="270" y="74" width="110" height="38" rx="8" fill="rgba(79,70,229,0.15)"  stroke="#4F46E5" stroke-width="1.5"/>
  <text x="325" y="91" text-anchor="middle" fill="#818CF8" font-size="11" font-weight="700">Webhook</text>
  <text x="325" y="105" text-anchor="middle" fill="#818CF8" font-size="10">Next.js Route</text>

  <rect x="410" y="74" width="100" height="38" rx="8" fill="rgba(79,70,229,0.15)"  stroke="#4F46E5" stroke-width="1.5"/>
  <text x="460" y="91" text-anchor="middle" fill="#818CF8" font-size="11" font-weight="700">Grammy</text>
  <text x="460" y="105" text-anchor="middle" fill="#818CF8" font-size="10">Bot Handler</text>

  <rect x="540" y="74" width="110" height="38" rx="8" fill="rgba(124,58,237,0.15)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="595" y="91" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700">OpenAI</text>
  <text x="595" y="105" text-anchor="middle" fill="#A78BFA" font-size="10">Whisper API</text>

  <rect x="680" y="74" width="110" height="38" rx="8" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5"/>
  <text x="735" y="91" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">Prisma</text>
  <text x="735" y="105" text-anchor="middle" fill="#34D399" font-size="10">Neon DB</text>

  <rect x="820" y="74" width="110" height="38" rx="8" fill="rgba(14,165,233,0.12)" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="875" y="91" text-anchor="middle" fill="#38BDF8" font-size="11" font-weight="700">Telegram</text>
  <text x="875" y="105" text-anchor="middle" fill="#38BDF8" font-size="10">Send Message</text>

  <!-- ══ LIFELINES ══ -->
  <line x1="65"  y1="112" x2="65"  y2="610" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="190" y1="112" x2="190" y2="610" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="325" y1="112" x2="325" y2="610" stroke="#4F46E5" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="460" y1="112" x2="460" y2="610" stroke="#4F46E5" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="595" y1="112" x2="595" y2="610" stroke="#7C3AED" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="735" y1="112" x2="735" y2="610" stroke="#10B981" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="875" y1="112" x2="875" y2="610" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>

  <!-- ══ MESSAGES ══ -->

  <!-- 1. Envía nota de voz -->
  <line x1="65" y1="148" x2="183" y2="148" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="124" y="142" text-anchor="middle" fill="#94A3B8" font-size="10">1. Nota de voz (.ogg)</text>

  <!-- 2. Webhook POST -->
  <rect x="318" y="160" width="14" height="320" fill="rgba(79,70,229,0.2)" stroke="#4F46E5" stroke-width="1"/>
  <line x1="190" y1="165" x2="318" y2="165" stroke="#818CF8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="254" y="159" text-anchor="middle" fill="#94A3B8" font-size="10">2. POST /api/telegram/webhook</text>

  <!-- 3. Grammy procesa -->
  <rect x="453" y="178" width="14" height="302" fill="rgba(79,70,229,0.18)" stroke="#4F46E5" stroke-width="1"/>
  <line x1="332" y1="178" x2="453" y2="178" stroke="#818CF8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="392" y="172" text-anchor="middle" fill="#94A3B8" font-size="10">3. bot.on('voice', handler)</text>

  <!-- 4. Descarga audio -->
  <line x1="467" y1="198" x2="183" y2="198" stroke="#818CF8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="324" y="192" text-anchor="middle" fill="#94A3B8" font-size="10">4. Descarga archivo voz</text>
  <line x1="183" y1="214" x2="460" y2="214" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="324" y="208" text-anchor="middle" fill="#64748B" font-size="10">5. Buffer audio .ogg</text>

  <!-- 6. Whisper transcribe -->
  <rect x="588" y="232" width="14" height="52" fill="rgba(124,58,237,0.25)" stroke="#7C3AED" stroke-width="1"/>
  <line x1="467" y1="232" x2="588" y2="232" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="527" y="226" text-anchor="middle" fill="#A78BFA" font-size="10">6. whisper.transcribe(audio)</text>
  <text x="595" y="255" text-anchor="middle" fill="#64748B" font-size="9" font-style="italic">audio → texto ES</text>
  <line x1="588" y1="270" x2="467" y2="270" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="527" y="264" text-anchor="middle" fill="#64748B" font-size="10">7. "Crea tarea urgente: banco"</text>

  <!-- 8. Parsear intención -->
  <text x="467" y="296" fill="#94A3B8" font-size="10">8. Parsear: título="banco", priority=URGENT, due=mañana</text>

  <!-- 9. Buscar usuario por telegramId -->
  <rect x="728" y="314" width="14" height="52" fill="rgba(16,185,129,0.25)" stroke="#10B981" stroke-width="1"/>
  <line x1="467" y1="314" x2="728" y2="314" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="596" y="308" text-anchor="middle" fill="#34D399" font-size="10">9. user.findUnique({ telegramId })</text>
  <line x1="728" y1="352" x2="467" y2="352" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="596" y="346" text-anchor="middle" fill="#64748B" font-size="10">10. User { id, name... }</text>

  <!-- 11. Crear tarea en DB -->
  <line x1="467" y1="376" x2="728" y2="376" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="596" y="370" text-anchor="middle" fill="#34D399" font-size="10">11. prisma.task.create({ userId, title... })</text>
  <line x1="728" y1="396" x2="467" y2="396" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="596" y="390" text-anchor="middle" fill="#64748B" font-size="10">12. Task { id... }</text>

  <!-- 13. Crear recordatorio -->
  <line x1="467" y1="420" x2="728" y2="420" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="596" y="414" text-anchor="middle" fill="#34D399" font-size="10">13. prisma.reminder.create()</text>
  <line x1="728" y1="438" x2="467" y2="438" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="596" y="432" text-anchor="middle" fill="#64748B" font-size="10">14. Reminder creado</text>

  <!-- 15. Enviar confirmación -->
  <rect x="868" y="458" width="14" height="22" fill="rgba(14,165,233,0.25)" stroke="#0EA5E9" stroke-width="1"/>
  <line x1="467" y1="460" x2="868" y2="460" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="666" y="454" text-anchor="middle" fill="#38BDF8" font-size="10">15. bot.api.sendMessage(chatId, "✅ Tarea creada...")</text>
  <line x1="868" y1="472" x2="72" y2="472" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="466" y="466" text-anchor="middle" fill="#64748B" font-size="10">16. Usuario recibe confirmación en Telegram</text>

  <!-- 17. Return 200 OK -->
  <line x1="332" y1="490" x2="190" y2="490" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
  <text x="260" y="484" text-anchor="middle" fill="#64748B" font-size="10">17. Return 200 OK</text>

  <text x="490" y="628" text-anchor="middle" fill="#334155" font-size="9">FlowTime — UML Secuencia: Crear Tarea vía Bot Telegram (Voz) v1.0 · 2026</text>
</svg>
